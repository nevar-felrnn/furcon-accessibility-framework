name: Validate Framework

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml

      - name: Create test convention
        run: |
          cp -r conventions/template conventions/test-con
          echo "convention: {name: 'Test', year: '2026'}" > conventions/test-con/convention.yaml

      - name: Run Validation Script
        run: |
          python validate_slots.py

      - name: Run Assembler (Smoke Test)
        run: |
          python assemble.py << EOF
          1
          EOF

          # Check if output was generated
          if [ -f "output/test-con-accessibility-plan-2026.md" ]; then
            echo "✅ Assembler test passed."
          else
            echo "❌ Assembler test failed: No output generated."
            exit 1
          fi