# Convention Configuration File
# ============================================================
# Fill in the values below for your convention.
# Lines starting with # are comments and are ignored.
# Text values go inside the quotes "like this".
# True/false values do not use quotes.
# Leave a value as "" if you don't know it yet.
# ============================================================

convention:
  name: ""                        # e.g. "Furcationland"
  year: ""                        # e.g. "2025"
  dates: ""                       # e.g. "June 13-15, 2025"
  website: ""                     # e.g. "https://furcationland.org"

venue:
  name: ""                        # e.g. "Radisson Hotel Providence"
  address: ""                     # e.g. "123 Main St, Providence, RI 02903"
  accessibility_desk_location: "" # e.g. "Main hall near registration"
  quiet_room_location: ""         # e.g. "Room 204"
  registration_location: ""       # e.g. "Room behind double doors off main lobby"
  notes: ""                       # Any venue-specific notes

contacts:
  accessibility_director:
    name: ""
    email: ""
    phone: ""
  accessibility_assistant_director:
    name: ""
    email: ""
    phone: ""
  safety_lead:
    name: ""
    email: ""
    phone: ""
  it_lead:
    name: ""
    email: ""
    phone: ""
  registration_lead:
    name: ""
    email: ""
    phone: ""
  convention_chair:
    name: ""
    email: ""
    phone: ""

desk_hours:
  open: ""                        # e.g. "10:00 AM"
  close: ""                       # e.g. "6:00 PM"
  notes: ""                       # e.g. "Hours may vary based on convention schedule"

interpreter_services:
  asl_contracted: false
  asl_vendor: ""
  asl_cost: ""
  asl_rooms_covered: ""           # e.g. "Main events room"
  cart_contracted: false
  cart_vendor: ""
  cart_cost: ""
  notes: ""

equipment:
  wheelchair_count: 0
  transport_chair_count: 0
  walker_count: 0
  cane_count: 0
  scooter_count: 0
  ownership_model: ""             # "owned", "rental", or "shared"
  storage_location: ""
  rental_vendor: ""
  liability_waiver_required: false
  liability_waiver_confirmed: false
  notes: ""

sensory_supplies:
  fidget_toys: false
  earmuffs_earplugs: false
  tinted_lenses: false
  weighted_lap_pads: false
  notes: ""

badge_emblem:
  emblem_description: ""          # e.g. "Small blue star sticker"
  applied_by_registration: true
  applied_by_accessibility: true
  cost_owner: ""                  # "accessibility", "registration", or "shared"
  notes: ""

quiet_room:
  location: ""
  camera_monitored: false
  it_contact_for_incidents: ""
  hours: ""                       # e.g. "Convention core hours only"
  notes: ""

budget:
  total_allocated: ""
  interpreter_budget: ""
  equipment_budget: ""
  printed_materials_budget: ""
  contingency_budget: ""
  supplemental_recognition_budget: ""
  notes: ""

shared_resources:
  partner_conventions: []         # List partner convention names e.g. ["Furpocalypse"]
  shared_equipment: false
  primary_storage_convention: ""
  transport_notes: ""

post_con:
  review_date: ""
  lessons_learned_doc: ""
  recommendations_submitted: false
  notes: ""
